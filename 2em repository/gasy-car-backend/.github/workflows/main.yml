name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:24.0.7-dind
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: docker login -u shop784 -p ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extracts metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: shop784/gasy-car-backend

      - name: Build and push Docker image
        run: |
          docker build -t shop784/gasy-car-backend:latest .
          docker push shop784/gasy-car-backend:latest


