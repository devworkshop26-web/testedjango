<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mot de passe modifié avec succès</title>
  {% load static %}
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1d4ed8, #0ba9c6);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111827;
    }

    .card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }

    .logo span {
      display: inline-block;
      margin-bottom: 16px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.4px;
      color: #1f2933;
    }

    h2 {
      margin-bottom: 12px;
      color: #1d4ed8;
      font-size: 22px;
    }

    p {
      margin-bottom: 24px;
      font-size: 15px;
      color: #374151;
    }

    .cta {
      display: inline-block;
      padding: 12px 20px;
      background: linear-gradient(135deg, #1d4ed8, #0ba9c6);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      transition: filter 0.2s ease, transform 0.05s ease;
    }

    .cta:hover {
      filter: brightness(1.05);
    }

    .cta:active {
      transform: translateY(1px);
    }


    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span>Madagasycar</span>
    </div>

    <h2>Mot de passe modifié</h2>
    <p>
      Votre mot de passe a été changé avec succès.<br />
      Vous pouvez maintenant vous connecter à votre compte Madagasycar avec vos nouvelles informations.
    </p>

    <a class="cta" href="https://madagasycar.com" target="_self">Retourner sur Madagasycar</a>
  </div>
</body>
</html>
