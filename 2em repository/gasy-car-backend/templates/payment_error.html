<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Paiement échoué</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .fade-in {
      animation: fadeIn 0.4s ease-out both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gradient-to-b from-red-100 to-red-50 min-h-screen flex items-center justify-center p-6">

  <div class="fade-in bg-white shadow-xl border border-red-200 rounded-2xl p-8 max-w-md w-full text-center">

    <!-- Icon -->
    <div class="flex justify-center mb-4">
      <div class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center shadow-inner">
        <!-- SVG Warning Icon -->
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 9v4"></path>
          <circle cx="12" cy="16" r="1"></circle>
          <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        </svg>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-red-700 mb-2">
      Le paiement a échoué
    </h1>

    <p class="text-sm text-red-500 mb-6 leading-relaxed">
      {{ message }}  
      <br>
      Veuillez réessayer ou contacter le support si le problème persiste.
    </p>

    <!-- Error details -->
    {% if errors %}
      <div class="text-left text-sm bg-red-50 text-red-700 border border-red-200 p-4 rounded-lg mb-6 shadow-sm">
        <p class="font-semibold mb-1">Détails de l’erreur :</p>
        <ul class="list-disc ml-4 space-y-1">
        {% for field, error_list in errors.items %}
            <li><strong>{{ field|capfirst }} :</strong> {{ error_list.0 }}</li>
        {% endfor %}
        </ul>
      </div>
    {% endif %}

    <!-- Action buttons -->
    <div class="space-y-3">
      <a href="/" 
         class="block w-full py-3 rounded-lg bg-red-600 text-white font-medium shadow hover:bg-red-700 transition">
        Retour à l’accueil
      </a>

      <a href="javascript:history.back()" 
         class="block w-full py-3 rounded-lg border border-red-300 text-red-600 font-medium hover:bg-red-100 transition">
        Réessayer
      </a>
    </div>

  </div>

</body>
</html>
